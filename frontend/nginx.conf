server {
    # Both stacks: busybox wget (healthcheck) resolves localhost to ::1 first,
    # and the image's ipv6-autoconfig script can't edit this root-owned file
    listen 3000;
    listen [::]:3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve .gz files pre-built by nitro compressPublicAssets, fall back to runtime gzip
    gzip_static on;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain application/xml;
    gzip_min_length 1024;

    # Hashed build assets — immutable, cache for a year
    location /_nuxt/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Static payloads and images — long cache, revalidate
    location ~* \.(png|jpg|jpeg|webp|avif|svg|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
